<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PNG Sprite Cropper</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 32px;
    }

    #drop-zone {
      width: 100%;
      max-width: 680px;
      border: 2px dashed #374151;
      border-radius: 16px;
      padding: 52px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #16161d;
      position: relative;
    }

    #drop-zone.dragover {
      border-color: #7c3aed;
      background: #1a1325;
    }

    #drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
      display: block;
    }

    .drop-label {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .drop-hint {
      font-size: 0.8rem;
      color: #6b7280;
    }

    #settings {
      width: 100%;
      max-width: 680px;
      margin-top: 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .setting-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.83rem;
      color: #9ca3af;
    }

    .setting-group label { white-space: nowrap; }

    .setting-group input[type="number"] {
      width: 64px;
      background: #1e1e2a;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #e8e8f0;
      padding: 4px 8px;
      font-size: 0.83rem;
    }

    .setting-group input[type="range"] {
      width: 100px;
      accent-color: #7c3aed;
    }

    #queue {
      width: 100%;
      max-width: 680px;
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .file-card {
      background: #16161d;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .file-thumb {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: contain;
      background: repeating-conic-gradient(#2a2a35 0% 25%, #1e1e28 0% 50%) 0 0 / 12px 12px;
      flex-shrink: 0;
    }

    .file-info { flex: 1; min-width: 0; }

    .file-name {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .file-status {
      font-size: 0.78rem;
      color: #6b7280;
    }

    .file-status.ok { color: #34d399; }
    .file-status.err { color: #f87171; }
    .file-status.skip { color: #fbbf24; }

    .progress-bar-wrap {
      height: 4px;
      background: #1f2937;
      border-radius: 4px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #3b82f6);
      border-radius: 4px;
      transition: width 0.3s;
      width: 0%;
    }

    .previews {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .previews img {
      height: 44px;
      width: auto;
      border-radius: 4px;
      background: repeating-conic-gradient(#2a2a35 0% 25%, #1e1e28 0% 50%) 0 0 / 8px 8px;
      border: 1px solid #374151;
    }

    #download-bar {
      width: 100%;
      max-width: 680px;
      margin-top: 24px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #download-bar.visible { display: flex; }

    .download-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #btn-download, #btn-download-webp {
      padding: 12px 32px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #btn-download-webp {
      background: linear-gradient(135deg, #059669, #10b981);
    }

    #btn-download:hover, #btn-download-webp:hover { opacity: 0.88; }

    #btn-download:disabled, #btn-download-webp:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #btn-clear {
      font-size: 0.78rem;
      color: #6b7280;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }

    canvas { display: none; }
  </style>
</head>
<body>
  <h1>PNG Sprite Cropper</h1>
  <p class="subtitle">ตัด sprite จาก PNG โดยอัตโนมัติ รองรับหลายไฟล์ → ดาวน์โหลด ZIP</p>

  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/png" multiple />
    <span class="drop-icon">🖼️</span>
    <div class="drop-label">วางไฟล์ PNG ที่นี่ หรือคลิกเพื่อเลือก</div>
    <div class="drop-hint">รองรับหลายไฟล์พร้อมกัน · เฉพาะ .png</div>
  </div>

  <div id="settings">
    <div class="setting-group">
      <label>Alpha threshold</label>
      <input type="range" id="alpha-threshold" min="1" max="64" value="10" />
      <span id="alpha-val">10</span>
    </div>
    <div class="setting-group">
      <label>Padding (px)</label>
      <input type="number" id="padding" value="0" min="0" max="64" />
    </div>
    <div class="setting-group">
      <label>Min size (px²)</label>
      <input type="number" id="min-size" value="64" min="1" max="10000" />
    </div>
  </div>

  <div id="queue"></div>

  <div id="download-bar">
    <div class="download-buttons">
      <button id="btn-download">⬇ ดาวน์โหลด ZIP</button>
      <button id="btn-download-webp">⬇ ดาวน์โหลด ZIP (WEBP)</button>
    </div>
    <button id="btn-clear">ล้างทั้งหมด</button>
  </div>

  <canvas id="work-canvas"></canvas>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const queue = document.getElementById('queue');
    const downloadBar = document.getElementById('download-bar');
    const btnDownload = document.getElementById('btn-download');
    const btnDownloadWebp = document.getElementById('btn-download-webp');
    const btnClear = document.getElementById('btn-clear');
    const alphaSlider = document.getElementById('alpha-threshold');
    const alphaVal = document.getElementById('alpha-val');
    const paddingInput = document.getElementById('padding');
    const minSizeInput = document.getElementById('min-size');
    const workCanvas = document.getElementById('work-canvas');
    const ctx = workCanvas.getContext('2d', { willReadFrequently: true });

    // all processed results: { filename, blobs[] }
    const results = [];

    alphaSlider.addEventListener('input', () => { alphaVal.textContent = alphaSlider.value; });

    // drag-drop
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFiles([...e.dataTransfer.files].filter(f => f.type === 'image/png'));
    });
    fileInput.addEventListener('change', () => {
      handleFiles([...fileInput.files]);
      fileInput.value = '';
    });

    btnClear.addEventListener('click', () => {
      results.length = 0;
      queue.innerHTML = '';
      downloadBar.classList.remove('visible');
    });

    btnDownload.addEventListener('click', buildZip);
    btnDownloadWebp.addEventListener('click', buildZipWebp);

    function handleFiles(files) {
      if (!files.length) return;
      files.forEach(file => processFile(file));
    }

    async function processFile(file) {
      const card = createCard(file.name);
      queue.appendChild(card);

      const threshold = parseInt(alphaSlider.value, 10);
      const padding = parseInt(paddingInput.value, 10);
      const minSize = parseInt(minSizeInput.value, 10);

      try {
        const img = await loadImage(file);
        card.querySelector('.file-thumb').src = URL.createObjectURL(file);

        workCanvas.width = img.naturalWidth;
        workCanvas.height = img.naturalHeight;
        ctx.clearRect(0, 0, workCanvas.width, workCanvas.height);
        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, workCanvas.width, workCanvas.height);
        const { data, width, height } = imageData;

        // check if any transparent pixel exists
        let hasTransparency = false;
        for (let i = 3; i < data.length; i += 4) {
          if (data[i] < threshold) { hasTransparency = true; break; }
        }

        if (!hasTransparency) {
          setStatus(card, 'skip', 'ไม่มีพื้นใส — ข้ามไฟล์นี้');
          setProgress(card, 100);
          return;
        }

        // connected component labeling via BFS on opaque pixels
        const components = findComponents(data, width, height, threshold, minSize);

        if (!components.length) {
          setStatus(card, 'skip', 'ไม่พบ component ที่มีขนาดเพียงพอ');
          setProgress(card, 100);
          return;
        }

        setStatus(card, '', `พบ ${components.length} item — กำลัง crop...`);

        const blobs = [];
        const previewEl = card.querySelector('.previews');

        for (let i = 0; i < components.length; i++) {
          const comp = components[i];
          const blob = await cropComponent(data, width, height, comp, padding);
          blobs.push({ name: `${baseName(file.name)}_${String(i + 1).padStart(3, '0')}.png`, blob });

          const url = URL.createObjectURL(blob);
          const img2 = document.createElement('img');
          img2.src = url;
          img2.title = `item ${i + 1}`;
          previewEl.appendChild(img2);

          setProgress(card, Math.round(((i + 1) / components.length) * 100));
          // yield to browser
          if (i % 10 === 9) await sleep(0);
        }

        results.push({ filename: file.name, blobs });
        setStatus(card, 'ok', `เสร็จ — ตัดออกมา ${blobs.length} รูป`);
        setProgress(card, 100);
        downloadBar.classList.add('visible');

      } catch (err) {
        setStatus(card, 'err', `Error: ${err.message}`);
        console.error(err);
      }
    }

    // BFS connected component labeling on alpha channel
    function findComponents(data, width, height, threshold, minSize) {
      const visited = new Uint8Array(width * height);
      const components = [];

      const isOpaque = (x, y) => {
        if (x < 0 || y < 0 || x >= width || y >= height) return false;
        return data[(y * width + x) * 4 + 3] >= threshold;
      };

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const idx = y * width + x;
          if (visited[idx] || !isOpaque(x, y)) continue;

          // BFS
          const pixels = [];
          const stack = [idx];
          visited[idx] = 1;
          let minX = x, maxX = x, minY = y, maxY = y;

          while (stack.length) {
            const cur = stack.pop();
            const cx = cur % width;
            const cy = (cur / width) | 0;
            pixels.push(cur);
            if (cx < minX) minX = cx;
            if (cx > maxX) maxX = cx;
            if (cy < minY) minY = cy;
            if (cy > maxY) maxY = cy;

            // 4-connected neighbours
            const neighbours = [
              cur - 1, cur + 1, cur - width, cur + width
            ];
            for (const n of neighbours) {
              if (n < 0 || n >= width * height) continue;
              if (visited[n]) continue;
              const nx = n % width;
              const ny = (n / width) | 0;
              // guard horizontal wrap
              if (Math.abs(nx - cx) > 1) continue;
              if (!isOpaque(nx, ny)) continue;
              visited[n] = 1;
              stack.push(n);
            }
          }

          const area = (maxX - minX + 1) * (maxY - minY + 1);
          if (area >= minSize) {
            components.push({ pixels, minX, maxX, minY, maxY });
          }
        }
      }

      return components;
    }

    function cropComponent(data, srcWidth, srcHeight, comp, padding) {
      const { pixels, minX, maxX, minY, maxY } = comp;
      const x0 = Math.max(0, minX - padding);
      const y0 = Math.max(0, minY - padding);
      const x1 = Math.min(srcWidth - 1, maxX + padding);
      const y1 = Math.min(srcHeight - 1, maxY + padding);
      const w = x1 - x0 + 1;
      const h = y1 - y0 + 1;

      // build a set of opaque pixels in this component for masking
      const pixelSet = new Set(pixels);

      const offscreen = new OffscreenCanvas(w, h);
      const oc = offscreen.getContext('2d');
      const outImg = oc.createImageData(w, h);
      const out = outImg.data;

      for (let dy = 0; dy < h; dy++) {
        for (let dx = 0; dx < w; dx++) {
          const sx = x0 + dx;
          const sy = y0 + dy;
          const srcIdx = sy * srcWidth + sx;
          if (pixelSet.has(srcIdx)) {
            const s = srcIdx * 4;
            const d = (dy * w + dx) * 4;
            out[d]     = data[s];
            out[d + 1] = data[s + 1];
            out[d + 2] = data[s + 2];
            out[d + 3] = data[s + 3];
          }
          // else transparent (already 0)
        }
      }

      oc.putImageData(outImg, 0, 0);
      return offscreen.convertToBlob({ type: 'image/png' });
    }

    async function buildZip() {
      if (!results.length) return;
      btnDownload.textContent = '⏳ กำลังสร้าง ZIP...';
      btnDownload.disabled = true;

      const zip = new JSZip();
      for (const { filename, blobs } of results) {
        const folder = results.length > 1 ? zip.folder(baseName(filename)) : zip;
        for (const { name, blob } of blobs) {
          const ab = await blob.arrayBuffer();
          folder.file(name, ab);
        }
      }

      const content = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
      const url = URL.createObjectURL(content);
      const a = document.createElement('a');
      a.href = url;
      a.download = results.length === 1 ? `${baseName(results[0].filename)}_sprites.zip` : 'sprites.zip';
      a.click();
      URL.revokeObjectURL(url);

      btnDownload.textContent = '⬇ ดาวน์โหลด ZIP';
      btnDownload.disabled = false;
    }

    async function pngBlobToWebp(blob, quality = 0.9) {
      const img = await loadImage(blob);
      const c = new OffscreenCanvas(img.naturalWidth || img.width, img.naturalHeight || img.height);
      const octx = c.getContext('2d');
      octx.clearRect(0, 0, c.width, c.height);
      octx.drawImage(img, 0, 0);
      return c.convertToBlob({ type: 'image/webp', quality });
    }

    async function buildZipWebp() {
      if (!results.length) return;
      btnDownloadWebp.textContent = '⏳ กำลังแปลงเป็น WEBP...';
      btnDownloadWebp.disabled = true;
      btnDownload.disabled = true;

      try {
        const zip = new JSZip();
        for (const { filename, blobs } of results) {
          const folder = results.length > 1 ? zip.folder(baseName(filename)) : zip;
          for (const { name, blob } of blobs) {
            const webpBlob = await pngBlobToWebp(blob);
            const ab = await webpBlob.arrayBuffer();
            folder.file(name.replace(/\.png$/i, '.webp'), ab);
          }
        }

        const content = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = results.length === 1 ? `${baseName(results[0].filename)}_sprites_webp.zip` : 'sprites_webp.zip';
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert('เกิดข้อผิดพลาดระหว่างแปลงเป็น WEBP: ' + err.message);
        console.error(err);
      }

      btnDownloadWebp.textContent = '⬇ ดาวน์โหลด ZIP (WEBP)';
      btnDownloadWebp.disabled = false;
      btnDownload.disabled = false;
    }

    // helpers
    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }

    function createCard(name) {
      const div = document.createElement('div');
      div.className = 'file-card';
      div.innerHTML = `
        <img class="file-thumb" src="" alt="" />
        <div class="file-info">
          <div class="file-name">${escHtml(name)}</div>
          <div class="file-status">กำลังประมวลผล...</div>
          <div class="progress-bar-wrap"><div class="progress-bar"></div></div>
          <div class="previews"></div>
        </div>`;
      return div;
    }

    function setStatus(card, cls, msg) {
      const el = card.querySelector('.file-status');
      el.className = 'file-status' + (cls ? ' ' + cls : '');
      el.textContent = msg;
    }

    function setProgress(card, pct) {
      card.querySelector('.progress-bar').style.width = pct + '%';
    }

    function baseName(filename) {
      return filename.replace(/\.png$/i, '');
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  </script>
</body>
</html>
